<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アミノ酸pHシミュレーター (側鎖電離 対応版)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .header { border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { font-size: 1.3em; margin: 0 0 5px 0; }
        
        .viz-box { 
            position: relative; background: #fff; border: 1px solid #e0e0e0; 
            border-radius: 12px; overflow: hidden; display: flex; justify-content: space-evenly; align-items: center;
            background: radial-gradient(circle at center, #ffffff 0%, #f8f9fa 100%);
            padding: 15px; flex-wrap: wrap; gap: 8px; min-height: 240px;
        }
        
        .h-ion { position: absolute; color: #e03131; font-weight: bold; pointer-events: none; z-index: 1; }
        
        .aa-molecule { 
            z-index: 10; padding: 10px 5px; border-radius: 8px; border: 1px solid #ddd;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(2px);
            text-align: center; flex: 0 1 42%; max-width: 130px; 
            transition: all 0.3s ease-in-out; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* 構造式：R基の色を紫にして目立たせる */
        .struct { font-family: 'Courier New', monospace; font-weight: bold; font-size: 0.95em; margin: 8px 0; line-height: 1.2; }
        .r-group { color: #8e44ad; font-size: 0.9em; }
        .ion-struct { font-size: 1.8em; margin: 15px 0; font-family: 'Arial', sans-serif; }
        
        .controls { margin-top: 15px; padding: 15px; background: #f1f3f5; border-radius: 12px; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; margin: 15px 0; background: transparent; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #ced4da; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb {
            height: 28px; width: 28px; border-radius: 50%; background: #1971c2;
            cursor: pointer; -webkit-appearance: none; margin-top: -10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; background-color: white; margin-top: 5px; }
        
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .metric-card { background: white; padding: 10px 5px; border-radius: 8px; border: 1px solid #dee2e6; font-size: 0.85em; }
        .val { display: block; font-size: 1.1em; font-weight: bold; color: #2c3e50; margin-top: 3px; }
        
        @media (max-width: 600px) {
            .metrics { grid-template-columns: 1fr; } 
            .metric-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
            .val { margin-top: 0; font-size: 1.1em; }
        }

        .pos { border-color: #ff8787; color: #e03131; box-shadow: 0 0 10px rgba(224,49,49,0.2); }
        .neu { border-color: #ced4da; color: #495057; }
        .neg { border-color: #74c0fc; color: #1971c2; box-shadow: 0 0 10px rgba(25,113,194,0.2); }
        
        /* 電荷バッジ（+2, -2 にも対応） */
        .charge-badge { font-size: 0.75em; opacity: 0.85; font-weight: bold; margin-bottom: 4px; display: inline-block; padding: 2px 6px; border-radius: 10px; background: #eee;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>アミノ酸pHシミュレーター </h2>
        <p style="color: #666; font-size: 0.85em; margin:0;">各官能基（α-COOH, α-NH3, 側鎖R）のpKaに基づく電荷遷移</p>
    </div>

    <div class="viz-box" id="viz"></div>

    <div class="controls">
        <label style="display:block; font-weight:bold;">バッファー pH: <span id="ph-display" style="color:#333; font-size:1.2em; display:inline-block; margin-left:10px;">7.0</span></label>
        <input type="range" id="ph-input" min="1" max="14" step="0.1" value="7.0">
        
        <label style="display:block; margin-top:15px; font-weight:bold;">分子・イオンを選択:</label>
        <select id="aa-select"></select>
    </div>

    <div class="metrics">
        <div class="metric-card"><span>等電点 (pI)</span><span class="val" id="pi-val">-</span></div>
        <div class="metric-card"><span>側鎖 pKr</span><span class="val" id="pkr-val">-</span></div>
        <div class="metric-card"><span>平均電荷</span><span class="val" id="charge-status" style="font-size:1.0em;">-</span></div>
    </div>
</div>

<script>
// 各基の正確なpKaデータを格納（pKa1: α-COOH, pKa2: α-NH3, pKr: 側鎖）
const MOLECULE_DATA = {
    'グリシン': { type: 'amino', pi: 5.97, pKa1: 2.34, pKa2: 9.60, pKr: null, rType: 'none', rName: 'H' },
    'アラニン': { type: 'amino', pi: 6.00, pKa1: 2.34, pKa2: 9.69, pKr: null, rType: 'none', rName: 'CH3' },
    'バリン': { type: 'amino', pi: 5.96, pKa1: 2.32, pKa2: 9.62, pKr: null, rType: 'none', rName: 'CH(CH3)2' },
    'アスパラギン酸': { type: 'amino', pi: 2.77, pKa1: 1.88, pKa2: 9.60, pKr: 3.65, rType: 'acid', rPos: 'R-COOH', rNeg: 'R-COO-' },
    'グルタミン酸': { type: 'amino', pi: 3.22, pKa1: 2.19, pKa2: 9.67, pKr: 4.25, rType: 'acid', rPos: 'R-COOH', rNeg: 'R-COO-' },
    'ヒスチジン': { type: 'amino', pi: 7.59, pKa1: 1.82, pKa2: 9.17, pKr: 6.00, rType: 'base', rPos: 'R-NH+', rNeg: 'R-N' }, // イミダゾール環の略記
    'リシン': { type: 'amino', pi: 9.74, pKa1: 2.18, pKa2: 8.95, pKr: 10.53, rType: 'base', rPos: 'R-NH3+', rNeg: 'R-NH2' },
    'アルギニン': { type: 'amino', pi: 10.76, pKa1: 2.17, pKa2: 9.04, pKr: 12.48, rType: 'base', rPos: 'R-NH2+', rNeg: 'R-NH' }, // グアニジノ基の略記
    'ナトリウムイオン (Na+)': { type: 'ion', charge: 'pos', symbol: 'Na+' },
    '塩化物イオン (Cl-)': { type: 'ion', charge: 'neg', symbol: 'Cl-' }
};

const VIZ_SIZE = 4;

function init() {
    const select = document.getElementById('aa-select');
    for (let name in MOLECULE_DATA) {
        let opt = document.createElement('option');
        opt.value = name;
        opt.innerText = MOLECULE_DATA[name].type === 'amino' ? `${name} (pI: ${MOLECULE_DATA[name].pi})` : name;
        select.appendChild(opt);
    }

    const viz = document.getElementById('viz');
    for(let i=0; i<45; i++) { 
        let h = document.createElement('div');
        h.className = 'h-ion';
        h.innerText = '+';
        h.style.left = Math.random() * 90 + 5 + '%';
        h.style.top = Math.random() * 90 + 5 + '%';
        h.style.fontSize = (Math.random() * 8 + 14) + 'px';
        viz.appendChild(h);
    }

    for(let i=0; i<VIZ_SIZE; i++) {
        let m = document.createElement('div');
        m.className = 'aa-molecule';
        m.id = `mol-${i}`;
        viz.appendChild(m);
    }

    document.getElementById('ph-input').oninput = update;
    document.getElementById('aa-select').onchange = update;
    update();
}

function update() {
    const ph = parseFloat(document.getElementById('ph-input').value);
    const selectedName = document.getElementById('aa-select').value;
    const data = MOLECULE_DATA[selectedName];
    
    document.getElementById('ph-display').innerText = ph.toFixed(1);

    const hIons = document.querySelectorAll('.h-ion');
    const opacity = Math.max(0, 1.2 - (ph / 9));
    hIons.forEach(h => h.style.opacity = opacity);

    const status = document.getElementById('charge-status');

    if (data.type === 'amino') {
        document.getElementById('pi-val').innerText = data.pi.toFixed(2);
        document.getElementById('pkr-val').innerText = data.pKr ? data.pKr.toFixed(2) : "無し";

        let total_net_charge = 0; // 全体の平均を出すため

        for(let i=0; i<VIZ_SIZE; i++) {
            const mol = document.getElementById(`mol-${i}`);
            // 各分子にわずかな「反応のズレ」を持たせて段階的変化を表現
            const offset = (i - (VIZ_SIZE-1)/2) * 0.4; 
            const local_pH = ph + offset;

            // 1. α-カルボキシ基の評価 (酸性)
            let coo_text = (local_pH < data.pKa1) ? "COOH" : "COO-";
            let coo_val  = (local_pH < data.pKa1) ? 0 : -1;

            // 2. α-アミノ基の評価 (塩基性)
            let nh3_text = (local_pH < data.pKa2) ? "NH3+" : "NH2";
            let nh3_val  = (local_pH < data.pKa2) ? +1 : 0;

            // 3. 側鎖(R基)の評価
            let r_text = "R";
            let r_val = 0;
            if (data.rType === 'none') {
                r_text = data.rName;
            } else if (data.rType === 'acid') {
                r_text = (local_pH < data.pKr) ? data.rPos : data.rNeg;
                r_val  = (local_pH < data.pKr) ? 0 : -1;
            } else if (data.rType === 'base') {
                r_text = (local_pH < data.pKr) ? data.rPos : data.rNeg;
                r_val  = (local_pH < data.pKr) ? +1 : 0;
            }

            // この分子の合計電荷
            let net_charge = coo_val + nh3_val + r_val;
            total_net_charge += net_charge;

            let cls, badgeText;
            if (net_charge > 0) {
                cls = "pos"; badgeText = `正電荷 (+${net_charge})`;
            } else if (net_charge < 0) {
                cls = "neg"; badgeText = `負電荷 (${net_charge})`;
            } else {
                cls = "neu"; badgeText = "中性 (0)";
            }

            mol.className = `aa-molecule ${cls}`;
            mol.innerHTML = `
                <div class="charge-badge">${badgeText}</div>
                <div class="struct">
                    ${nh3_text}<br>|<br>CH—<span class="r-group">${r_text}</span><br>|<br>${coo_text}
                </div>
            `;
        }

        // 全体のステータス評価
        let avg_charge = total_net_charge / VIZ_SIZE;
        if (avg_charge > 0) { 
            status.innerText = `正に帯電 (約+${Math.abs(Math.round(avg_charge))})`; status.style.color = "#e03131"; 
        } else if (avg_charge < 0) { 
            status.innerText = `負に帯電 (約-${Math.abs(Math.round(avg_charge))})`; status.style.color = "#1971c2"; 
        } else { 
            status.innerText = "ほぼ中性 (±0)"; status.style.color = "#495057"; 
        }

    } else if (data.type === 'ion') {
        document.getElementById('pi-val').innerText = "N/A";
        document.getElementById('pkr-val').innerText = "N/A";

        for(let i=0; i<VIZ_SIZE; i++) {
            const mol = document.getElementById(`mol-${i}`);
            let cls = data.charge === 'pos' ? "pos" : "neg";
            let badgeText = data.charge === 'pos' ? "正電荷 (+1)" : "負電荷 (-1)";

            mol.className = `aa-molecule ${cls}`;
            mol.innerHTML = `
                <div class="charge-badge">${badgeText}</div>
                <div class="struct ion-struct">${data.symbol}</div>
            `;
        }

        if (data.charge === 'pos') {
            status.innerText = "常に正電荷 (+)"; status.style.color = "#e03131";
        } else {
            status.innerText = "常に負電荷 (-)"; status.style.color = "#1971c2";
        }
    }
}

window.onload = init;
</script>

</body>
</html>
