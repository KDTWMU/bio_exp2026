<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stepwise Amino Acid & Ion Simulator (Mobile Friendly)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .header { border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .header h2 { font-size: 1.4em; margin: 0 0 5px 0; }
        
        .viz-box { 
            position: relative; background: #fff; border: 1px solid #e0e0e0; 
            border-radius: 12px; overflow: hidden; display: flex; justify-content: space-around; align-items: center;
            background: radial-gradient(circle at center, #ffffff 0%, #f8f9fa 100%);
            padding: 15px; flex-wrap: wrap; gap: 10px; min-height: 250px;
        }
        
        .h-ion { position: absolute; color: #e03131; font-weight: bold; pointer-events: none; z-index: 1; }
        
        .aa-molecule { 
            z-index: 10; padding: 12px 5px; border-radius: 10px; border: 1px solid #ddd;
            background: rgba(255,255,255,0.95); text-align: center;
            flex: 1 1 40%; /* スマホでは2列になるように設定 */
            min-width: 120px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .struct { font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.1em; margin: 8px 0; }
        .ion-struct { font-size: 2.2em; margin: 15px 0; font-family: 'Arial', sans-serif; }
        
        .controls { margin-top: 20px; padding: 15px; background: #f1f3f5; border-radius: 12px; }
        
        /* スマホ用: スライダーをタッチしやすく大きくする */
        input[type="range"] {
            -webkit-appearance: none; width: 100%; margin: 15px 0; background: transparent;
        }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer; background: #ced4da; border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            height: 30px; width: 30px; border-radius: 50%; background: #1971c2;
            cursor: pointer; -webkit-appearance: none; margin-top: -11px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* スマホ用: ドロップダウンをタップしやすくする */
        select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; 
            font-size: 16px; /* 16pxにするとiOS Safariで勝手にズームされない */
            background-color: white; margin-top: 5px;
        }
        
        /* スマホ用: 画面幅が狭いときは数値を縦に並べる */
        .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; text-align: center; }
        .metric-card { background: white; padding: 12px 5px; border-radius: 8px; border: 1px solid #dee2e6; font-size: 0.9em; }
        .val { display: block; font-size: 1.3em; font-weight: bold; color: #2c3e50; margin-top: 5px; }
        
        @media (max-width: 600px) {
            .metrics { grid-template-columns: 1fr; } /* 縦一列に変更 */
            .metric-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
            .metric-card span:first-child { color: #666; font-size: 1.1em; }
            .val { margin-top: 0; }
        }

        .pos { border-color: #ff8787; color: #e03131; box-shadow: 0 0 15px rgba(224,49,49,0.2); }
        .neu { border-color: #ced4da; color: #495057; }
        .neg { border-color: #74c0fc; color: #1971c2; box-shadow: 0 0 15px rgba(25,113,194,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>アミノ酸pHシミュレーター</h2>
        <p style="color: #666; font-size: 0.85em; margin:0;">pHの変化に応じた遷移と定電荷イオンの比較</p>
    </div>

    <div class="viz-box" id="viz">
        </div>

    <div class="controls">
        <label style="display:block; font-weight:bold;">バッファー pH: <span id="ph-display" style="color:#333; font-size:1.3em; display:inline-block; margin-left:10px;">7.0</span></label>
        <input type="range" id="ph-input" min="1" max="14" step="0.1" value="7.0">
        
        <label style="display:block; margin-top:20px; font-weight:bold;">分子・イオンを選択:</label>
        <select id="aa-select"></select>
    </div>

    <div class="metrics">
        <div class="metric-card"><span>等電点 (pI)</span><span class="val" id="pi-val">-</span></div>
        <div class="metric-card"><span>pH - pI</span><span class="val" id="diff-val">-</span></div>
        <div class="metric-card"><span>平均電荷</span><span class="val" id="charge-status" style="font-size:1.1em;">-</span></div>
    </div>
</div>

<script>
const MOLECULE_DATA = {
    'グリシン': { type: 'amino', pi: 5.97 },
    'アラニン': { type: 'amino', pi: 6.00 },
    'バリン': { type: 'amino', pi: 5.96 },
    'アスパラギン酸': { type: 'amino', pi: 2.77 },
    'グルタミン酸': { type: 'amino', pi: 3.22 },
    'ヒスチジン': { type: 'amino', pi: 7.59 },
    'リシン': { type: 'amino', pi: 9.74 },
    'アルギニン': { type: 'amino', pi: 10.76 },
    'ナトリウムイオン (Na+)': { type: 'ion', charge: 'pos', symbol: 'Na+' },
    '塩化物イオン (Cl-)': { type: 'ion', charge: 'neg', symbol: 'Cl-' }
};

const VIZ_SIZE = 4;

function init() {
    const select = document.getElementById('aa-select');
    for (let name in MOLECULE_DATA) {
        let opt = document.createElement('option');
        opt.value = name;
        if (MOLECULE_DATA[name].type === 'amino') {
            opt.innerText = `${name} (pI: ${MOLECULE_DATA[name].pi})`;
        } else {
            opt.innerText = name;
        }
        select.appendChild(opt);
    }

    const viz = document.getElementById('viz');
    for(let i=0; i<40; i++) { // スマホ向けにH+の描画数を少し減らして軽量化
        let h = document.createElement('div');
        h.className = 'h-ion';
        h.innerText = '+';
        h.style.left = Math.random() * 90 + 5 + '%';
        h.style.top = Math.random() * 90 + 5 + '%';
        h.style.fontSize = (Math.random() * 10 + 12) + 'px';
        viz.appendChild(h);
    }

    for(let i=0; i<VIZ_SIZE; i++) {
        let m = document.createElement('div');
        m.className = 'aa-molecule';
        m.id = `mol-${i}`;
        viz.appendChild(m);
    }

    document.getElementById('ph-input').oninput = update;
    document.getElementById('aa-select').onchange = update;
    update();
}

function update() {
    const ph = parseFloat(document.getElementById('ph-input').value);
    const selectedName = document.getElementById('aa-select').value;
    const data = MOLECULE_DATA[selectedName];
    
    document.getElementById('ph-display').innerText = ph.toFixed(1);

    const hIons = document.querySelectorAll('.h-ion');
    const opacity = Math.max(0, 1.2 - (ph / 9));
    hIons.forEach(h => h.style.opacity = opacity);

    const status = document.getElementById('charge-status');

    if (data.type === 'amino') {
        const pi = data.pi;
        const diff = ph - pi;
        
        document.getElementById('pi-val').innerText = pi.toFixed(2);
        document.getElementById('diff-val').innerText = (diff > 0 ? "+" : "") + diff.toFixed(2);

        for(let i=0; i<VIZ_SIZE; i++) {
            const mol = document.getElementById(`mol-${i}`);
            const offset = (i - (VIZ_SIZE-1)/2) * 0.4; 
            const localDiff = diff + offset;

            let state, nh, coo, cls;

            if (localDiff < -0.8) {
                state = "正電荷 (+)"; nh = "NH3+"; coo = "COOH"; cls = "pos";
            } else if (localDiff > 0.8) {
                state = "負電荷 (-)"; nh = "NH2"; coo = "COO-"; cls = "neg";
            } else {
                state = "中性 (0)"; nh = "NH3+"; coo = "COO-"; cls = "neu"; 
            }

            mol.className = `aa-molecule ${cls}`;
            mol.innerHTML = `
                <div style="font-size:0.85em; opacity:0.8; font-weight:bold; margin-bottom:4px;">${state}</div>
                <div class="struct">${nh}<br>|<br>CH-R<br>|<br>${coo}</div>
            `;
        }

        if (diff < -1) { 
            status.innerText = "正電荷 (+)"; status.style.color = "#e03131"; 
        } else if (diff > 1) { 
            status.innerText = "負電荷 (-)"; status.style.color = "#1971c2"; 
        } else { 
            status.innerText = "ほぼ中性"; status.style.color = "#495057"; 
        }

    } else if (data.type === 'ion') {
        document.getElementById('pi-val').innerText = "N/A";
        document.getElementById('diff-val').innerText = "N/A";

        for(let i=0; i<VIZ_SIZE; i++) {
            const mol = document.getElementById(`mol-${i}`);
            let state, cls;

            if (data.charge === 'pos') {
                state = "正電荷 (+)"; cls = "pos";
            } else {
                state = "負電荷 (-)"; cls = "neg";
            }

            mol.className = `aa-molecule ${cls}`;
            mol.innerHTML = `
                <div style="font-size:0.85em; opacity:0.8; font-weight:bold; margin-bottom:4px;">${state}</div>
                <div class="struct ion-struct">${data.symbol}</div>
            `;
        }

        if (data.charge === 'pos') {
            status.innerText = "常に正電荷 (+)"; status.style.color = "#e03131";
        } else {
            status.innerText = "常に負電荷 (-)"; status.style.color = "#1971c2";
        }
    }
}

window.onload = init;
</script>

</body>
</html>
